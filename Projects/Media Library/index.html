<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Library</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="header">
                <div class="header-title">
                    <a href="./index.html">Media Library</a>
                </div>
                <div class="header-selections">
                    <a href="./Pages/movies.html">Movies</a>
                    <a href="./Pages/television.html">TV Shows</a>
                    <a href="./Pages/wishlist.html">Wish List</a>
                </div>
        </div>
    </header>
    <main>

        <div class="introduction">


        </div>

        <div class="movies">
            <h1>Movies</h1>
            <div class="movies-card">
            
                <div id="movie-grid" class="movie-grid"></div>

            </div>
        </div>

        <div class="television">
            <h1>TV Shows</h1>
            <div class="television-card">

                <div id="tv-grid" class="tv-grid"></div>

            </div>
        </div>

        <div class="wishlist">
            <h1>Wish List</h1>
            <div class="wishlist-card">

            </div>
        </div>

        <div class="random">
            <h1>Not Sure What to Watch?</h1>
            <div class="random-card">
                <button id="movie-btn">Random Movie</button>
                <button id="tv-btn">Random TV Show</button>
            </div>
            <div>
                <p id="movie-result"></p>
                <br>
                <p id="tv-result"></p>
            </div>
        </div>


    </main>

<script src="./script.js"></script>
</body>
</html>
